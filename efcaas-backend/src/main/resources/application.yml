spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:efcaas}
    username: ${DB_USER:efcaas}
    password: ${DB_PASSWORD:efcaas}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: eFCaaS API
    description: API REST da plataforma de Checagem de Fatos como Serviço
    version: 0.1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

efcaas:
  jwt:
    secret: ${JWT_SECRET:efcaas-dev-secret-key-must-be-changed-in-production-use-256bit}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

denodare:
  base-url: ${DENODARE_BASE_URL:https://homolog.denodare.inf.ufg.br/api}
  email: ${DENODARE_EMAIL:}
  password: ${DENODARE_PASSWORD:}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

logging:
  level:
    br.com.efcaas: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    br.com.efcaas: INFO
    root: WARN
