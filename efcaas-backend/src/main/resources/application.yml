spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:efcaas}
    username: ${DB_USER:efcaas}
    password: ${DB_PASSWORD:efcaas}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: ${PORT:8080}
  tomcat:
    max-http-form-post-size: 200MB
    max-swallow-size: 200MB
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: eFCaaS API
    description: API REST da plataforma de Checagem de Fatos como Serviço
    version: 0.1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

efcaas:
  api:
    public-url: ${API_PUBLIC_URL:http://localhost:8080/api/v1}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@efcaas.com}
  jwt:
    secret: ${JWT_SECRET:efcaas-dev-secret-key-must-be-changed-in-production-use-256bit}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:efcaas}
    secret-key: ${MINIO_SECRET_KEY:efcaas123456}
    bucket: ${MINIO_BUCKET:efcaas-evidencias}
    presigned-url-expiry-minutes: ${MINIO_PRESIGNED_EXPIRY_MINUTES:1440}
  guaia:
    base-url: ${GUAIA_BASE_URL:https://ia-api-hub.guaiaweb.inf.ufg.br}
    username: ${GUAIA_USERNAME:efcaas}
    password: ${GUAIA_PASSWORD:akC3ah2fcDn2fKtG}
    tenant-id: ${GUAIA_TENANT_ID:}
    tenant-slug: ${GUAIA_TENANT_SLUG:}
    institution-id: ${GUAIA_INSTITUTION_ID:}
    institution-slug: ${GUAIA_INSTITUTION_SLUG:}
    institution-name: ${GUAIA_INSTITUTION_NAME:eFCaaS}
  ingest:
    api-key: ${INGEST_API_KEY:efcaas-ingest-dev-key}
    default-tenant-slug: ${INGEST_DEFAULT_TENANT_SLUG:dev}
  abuse:
    redis:
      enabled: ${ABUSE_REDIS_ENABLED:true}
    rate-limit:
      per-ip: ${ABUSE_RATE_IP:60}
      per-token: ${ABUSE_RATE_TOKEN:120}
      per-channel: ${ABUSE_RATE_CHANNEL:200}
      window-seconds: ${ABUSE_WINDOW:60}
      cooldown-seconds: ${ABUSE_COOLDOWN:300}
      max-violations-before-block: ${ABUSE_MAX_VIOLATIONS:5}
    duplicate:
      window-seconds: ${ABUSE_DUP_WINDOW:300}
      reject-duplicates: ${ABUSE_REJECT_DUP:false}
  channels:
    whatsapp:
      enabled: ${WHATSAPP_ENABLED:false}
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
      access-token: ${WHATSAPP_ACCESS_TOKEN:}
      app-secret: ${WHATSAPP_APP_SECRET:}
      verify-token: ${WHATSAPP_VERIFY_TOKEN:}
      graph-api-version: ${WHATSAPP_GRAPH_VERSION:v21.0}
    telegram:
      enabled: ${TELEGRAM_ENABLED:false}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      secret-token: ${TELEGRAM_SECRET_TOKEN:}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

logging:
  level:
    br.com.efcaas: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jpa:
    show-sql: false

server:
  tomcat:
    max-http-form-post-size: 200MB
    max-swallow-size: 200MB

logging:
  level:
    br.com.efcaas: INFO
    root: WARN
