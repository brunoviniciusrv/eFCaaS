spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

efcaas:
  jwt:
    secret: test-secret-key-for-unit-tests-minimum-256-bits-length
  ingest:
    api-key: test-ingest-key
  abuse:
    redis:
      enabled: false
    rate-limit:
      per-ip: 1000
      per-token: 1000
      per-channel: 1000
      window-seconds: 60
      cooldown-seconds: 60
      max-violations-before-block: 100
    duplicate:
      window-seconds: 300
      reject-duplicates: false
  channels:
    whatsapp:
      enabled: false
    telegram:
      enabled: false
