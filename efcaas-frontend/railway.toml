# Configuração do serviço front-end no Railway.
# No painel: New Service → GitHub Repo → Root Directory = efcaas-frontend

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.args]
VITE_API_URL = "${VITE_API_URL}"
GEMINI_API_KEY = "${GEMINI_API_KEY}"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
