name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend (Maven verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: efcaas-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Verify
        run: mvn -B verify

  frontend:
    name: Frontend (TypeScript check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: efcaas-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: efcaas-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (tsc --noEmit)
        run: npm run lint
